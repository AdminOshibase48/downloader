<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Grabber Pro - Direct Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #ffffff;
            background-image: linear-gradient(#000 1.5px, transparent 1.5px), linear-gradient(90deg, #000 1.5px, transparent 1.5px);
            background-size: 40px 40px;
            margin: 0; padding: 20px 10px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .neu-container {
            background: #ffffff; border: 4px solid #000;
            border-radius: 24px; box-shadow: 10px 10px 0px 0px #000;
            overflow: hidden; width: 100%; max-width: 800px;
        }

        .neu-header {
            background-color: #ffde33; border-bottom: 4px solid #000;
            padding: 30px 20px; text-align: center; position: relative;
        }

        .title-text {
            color: #ffffff; font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 700; text-transform: uppercase;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .neu-input {
            width: 100%; border: 4px solid #000; border-radius: 12px;
            padding: 14px; font-size: 1rem; box-shadow: 4px 4px 0px 0px #000;
            outline: none; transition: all 0.1s;
        }
        
        .neu-btn-pink {
            background-color: #ff479a; color: #ffffff; border: 4px solid #000;
            border-radius: 12px; padding: 14px; font-weight: 700;
            box-shadow: 4px 4px 0px 0px #000; cursor: pointer; text-transform: uppercase;
            transition: all 0.1s;
        }

        .neu-btn-pink:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px 0px #000; }
        
        .platform-tab { opacity: 0.5; transition: all 0.2s; cursor: pointer; }
        .platform-tab.active {
            opacity: 1; border: 3px solid #000; background-color: #ffde33;
            border-radius: 10px; transform: scale(1.1); box-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <div class="neu-container">
        <header class="neu-header">
            <h1 class="title-text">VIBE GRABBER</h1>
            <div class="bg-white border-2 border-black rounded-full px-4 py-1 inline-block mt-2 font-bold text-sm">🔥 DIRECT API ENGINE 🔥</div>
        </header>

        <main class="p-6 md:p-8 flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-1/2 space-y-6">
                <div class="flex justify-center gap-4 mb-4">
                    <div onclick="setPlatform('yt')" id="tab-yt" class="platform-tab active p-2 text-3xl text-red-500"><i class="fa-brands fa-youtube"></i></div>
                    <div onclick="setPlatform('tt')" id="tab-tt" class="platform-tab p-2 text-3xl text-black"><i class="fa-brands fa-tiktok"></i></div>
                </div>

                <form id="downloadForm" class="space-y-4">
                    <input type="text" id="searchInput" class="neu-input" placeholder="Paste link media di sini..." required>
                    <button type="submit" id="submitBtn" class="neu-btn-pink w-full">⚡ DOWNLOAD SEKARANG</button>
                </form>
            </div>

            <div class="w-full md:w-1/2 border-4 border-black rounded-xl p-6 bg-gray-50 flex flex-col justify-center items-center text-center">
                <div id="statusArea">
                    <i class="fa-solid fa-cloud-arrow-down text-5xl mb-4 text-gray-400"></i>
                    <p class="font-bold">Menunggu tautan...</p>
                </div>
            </div>
        </main>
    </div>

    <div class="fixed bottom-4 right-4 bg-white border-2 border-black px-4 py-2 rounded-full font-bold text-xs shadow-[2px_2px_0_0_#000]">
        Made by ourstorytogether • 2026
    </div>

    <script>
        // CONFIGURASI API
        const API_ENDPOINT = "https://api.cobalt.tools/api/json";

        let currentPlatform = 'yt';

        function setPlatform(platform) {
            currentPlatform = platform;
            document.querySelectorAll('.platform-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${platform}`).classList.add('active');
        }

        document.getElementById('downloadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('searchInput').value.trim();
            const statusArea = document.getElementById('statusArea');
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            statusArea.innerHTML = `<i class="fa-solid fa-spinner animate-spin text-4xl text-pink-500"></i><p class="mt-2 font-bold">Mengambil data...</p>`;

            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: url,
                        vQuality: "720",
                        filenamePattern: "classic"
                    })
                });

                const data = await response.json();

                if (data.status === 'stream' || data.status === 'redirect') {
                    // Memicu download otomatis
                    const link = document.createElement('a');
                    link.href = data.url;
                    link.target = "_blank";
                    link.click();
                    
                    statusArea.innerHTML = `<i class="fa-solid fa-check text-4xl text-green-500"></i><p class="mt-2 font-bold text-green-600">Unduhan Dimulai!</p>`;
                } else {
                    statusArea.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-4xl text-red-500"></i><p class="mt-2 font-bold">Gagal memproses link.</p>`;
                }
            } catch (err) {
                statusArea.innerHTML = `<p class="text-red-500 font-bold">Error koneksi ke API.</p>`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
